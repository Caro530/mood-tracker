<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mood Tracker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --primary: #58CC02;       /* Duolingo Green */
      --primary-shadow: #58A700;
      --bg: #FFFFFF;
      --text: #3C3C3C;
      --text-light: #AFAFAF;
      --gray-btn: #E5E5E5;
      --gray-shadow: #CECECE;
    }
    
    body { 
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; padding: 0; background-color: var(--bg); color: var(--text);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* Custom Bouncy Splash Screen */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      transition: opacity 0.5s;
    }
    #splash-screen img {
      width: 120px; height: 120px;
      animation: heartBeat 1.5s infinite;
    }
    @keyframes heartBeat {
      0% { transform: scale(1); }
      14% { transform: scale(1.15); }
      28% { transform: scale(1); }
      42% { transform: scale(1.15); }
      70% { transform: scale(1); }
    }

    /* Header & Progress Bar */
    header {
      padding: 20px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid var(--gray-btn);
    }
    header img { width: 40px; height: 40px; border-radius: 12px; }
    .progress-bar-bg {
      flex: 1; height: 16px; background: var(--gray-btn); border-radius: 10px; margin: 0 15px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--primary); width: 33%;
      border-radius: 10px; transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
    .hidden { display: none !important; }
    
    /* View Transitions */
    .screen { animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); height: 100%; display: flex; flex-direction: column; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    
    h2 { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 30px; }
    
    /* 3D Square Mood Buttons */
    .mood-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 30px; }
    .mood-btn {
      aspect-ratio: 1; border-radius: 16px; border: 2px solid transparent; 
      font-size: 24px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.1s; animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }
    @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
    
    /* Stagger button animations */
    .mood-btn:nth-child(1) { animation-delay: 0.05s; } .mood-btn:nth-child(2) { animation-delay: 0.1s; }
    .mood-btn:nth-child(3) { animation-delay: 0.15s; } .mood-btn:nth-child(4) { animation-delay: 0.2s; }
    .mood-btn:nth-child(5) { animation-delay: 0.25s; } .mood-btn:nth-child(6) { animation-delay: 0.3s; }
    .mood-btn:nth-child(7) { animation-delay: 0.35s; } .mood-btn:nth-child(8) { animation-delay: 0.4s; }
    .mood-btn:nth-child(9) { animation-delay: 0.45s; } .mood-btn:nth-child(10) { animation-delay: 0.5s; }

    /* Button Colors & 3D Shadow */
    .mood-btn:active { transform: translateY(4px); border-bottom-width: 2px !important; margin-top: 4px; }
    .m-red { background: #FF4B4B; border-bottom: 6px solid #EA1515; }
    .m-orange { background: #FF9600; border-bottom: 6px solid #D37A00; }
    .m-yellow { background: #FFC800; border-bottom: 6px solid #DFA600; }
    .m-lightgreen { background: #A5ED00; border-bottom: 6px solid #84C500; }
    .m-green { background: #58CC02; border-bottom: 6px solid #58A700; }
    
    /* Textareas */
    textarea {
      width: 100%; padding: 20px; border-radius: 16px; border: 2px solid var(--gray-btn);
      background: #F7F7F7; font-size: 18px; font-weight: bold; color: var(--text);
      box-sizing: border-box; resize: none; margin-bottom: 20px; transition: 0.2s;
    }
    textarea:focus { outline: none; border-color: var(--primary); background: #FFFFFF; }
    
    /* Duolingo Main Action Buttons */
    .btn {
      background: var(--primary); color: white; padding: 16px; border-radius: 16px; border: none;
      border-bottom: 6px solid var(--primary-shadow); font-size: 18px; font-weight: 800; text-transform: uppercase;
      width: 100%; cursor: pointer; transition: all 0.1s; letter-spacing: 1px;
    }
    .btn:active { transform: translateY(4px); border-bottom-width: 2px; margin-top: 4px; }
    .btn-secondary {
      background: #FFFFFF; color: var(--text-light); border: 2px solid var(--gray-btn);
      border-bottom: 6px solid var(--gray-shadow); margin-top: 15px;
    }

    /* History Cards */
    .card { 
      border: 2px solid var(--gray-btn); border-radius: 16px; padding: 20px; margin-bottom: 15px; 
      border-bottom: 6px solid var(--gray-shadow); background: #FFFFFF;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gray-btn); padding-bottom: 15px; margin-bottom: 15px; }
    .mood-badge { background: var(--primary); color: white; padding: 8px 14px; border-radius: 12px; font-weight: 800; font-size: 16px; }
    
    /* Success Overlay */
    #success-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9998;
    }
    #success-screen h1 { color: var(--primary); font-size: 32px; font-weight: 900; animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* Bottom Navigation */
    nav {
      position: fixed; bottom: 0; width: 100%; background: #FFFFFF; display: flex;
      border-top: 2px solid var(--gray-btn); padding-bottom: env(safe-area-inset-bottom); z-index: 100;
    }
    .nav-btn { flex: 1; padding: 20px; border: none; background: none; font-size: 16px; font-weight: 800; color: var(--text-light); text-transform: uppercase; cursor: pointer; transition: 0.2s;}
    .nav-btn.active { color: var(--primary); background: #E5F6D3; border-top: 4px solid var(--primary); }
  </style>
</head>
<body>

  <!-- Loading Splash Screen -->
  <div id="splash-screen">
    <img src="icon.png" alt="Logo">
    <h2 style="margin-top: 20px; color: var(--primary);">Loading...</h2>
  </div>

  <!-- Success Screen -->
  <div id="success-screen" class="hidden">
    <img src="icon.png" alt="Logo" style="width:100px; margin-bottom: 20px;">
    <h1>Great Job!</h1>
  </div>

  <header>
    <img src="icon.png" alt="Logo">
    <div class="progress-bar-bg" id="progress-container"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <span style="font-weight: 800; color: var(--primary);">MOOD</span>
  </header>

  <main>
    <!-- HISTORY TAB -->
    <section id="history-tab">
      <div id="summary-view" class="card hidden"></div>
      <div id="entries-list"></div>
    </section>

    <!-- LOG MOOD WIZARD -->
    <section id="form-tab" class="hidden">
      
      <!-- Step 1: Mood -->
      <div id="step-1" class="screen">
        <h2>How are you feeling?</h2>
        <div class="mood-grid">
          <button class="mood-btn m-red" onclick="selectMood(1)">1</button>
          <button class="mood-btn m-red" onclick="selectMood(2)">2</button>
          <button class="mood-btn m-orange" onclick="selectMood(3)">3</button>
          <button class="mood-btn m-orange" onclick="selectMood(4)">4</button>
          <button class="mood-btn m-yellow" onclick="selectMood(5)">5</button>
          <button class="mood-btn m-yellow" onclick="selectMood(6)">6</button>
          <button class="mood-btn m-lightgreen" onclick="selectMood(7)">7</button>
          <button class="mood-btn m-lightgreen" onclick="selectMood(8)">8</button>
          <button class="mood-btn m-green" onclick="selectMood(9)">9</button>
          <button class="mood-btn m-green" onclick="selectMood(10)">10</button>
        </div>
      </div>

      <!-- Step 2: What -->
      <div id="step-2" class="screen hidden">
        <h2>What's going on?</h2>
        <textarea id="happened" rows="6" placeholder="I am..."></textarea>
        <button class="btn" onclick="nextStep(3)">Continue</button>
        <button class="btn btn-secondary" onclick="nextStep(1)">Go Back</button>
      </div>

      <!-- Step 3: Why -->
      <div id="step-3" class="screen hidden">
        <h2>Why do you feel this way?</h2>
        <textarea id="why" rows="6" placeholder="Because..."></textarea>
        <button class="btn" onclick="saveEntry()">Finish</button>
        <button class="btn btn-secondary" onclick="nextStep(2)">Go Back</button>
      </div>

    </section>
  </main>

  <nav>
    <button id="nav-history" class="nav-btn active" onclick="switchTab('history')">History</button>
    <button id="nav-log" class="nav-btn" onclick="switchTab('log')">Log Mood</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
